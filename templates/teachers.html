{% extends 'base.html' %}
{% block title %}Teachers{% endblock %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>👨‍🏫 Teachers</h2>
    <a href="{{ url_for('new_teacher') }}" class="btn btn-primary">+ Add Teacher</a>
</div>

<div class="card shadow">
    <div class="card-body">
        <table class="table table-striped">
            <thead class="table-dark">
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Actions</th>

                </tr>
            </thead>
            <tbody>
                {% for teacher in teachers %}
                <tr>
                    <td>{{ teacher.name }}</td>
                    <td>{{ teacher.email }}</td>
                    <td>
                        <a href="{{ url_for('update_teacher', id=teacher.id) }}" class="btn btn-warning btn-sm">Edit

                        </a>
                        
                    <form action="{{ url_for('delete_teacher', id=teacher.id) }}" method="POST" style="display:inline;">
                        <button type="submit" class="btn btn-danger btn-sm"
                                onclick="return confirm('Are you sure you want to delete this teacher?');"> 
                                Delete 
                        </button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
        </table>
    </div>
</div>
{% endblock %}
